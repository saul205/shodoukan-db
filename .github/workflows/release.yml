name: Release database

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 03:00 UTC
  workflow_dispatch:       # also triggerable manually

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build database
        run: cargo run -p builder --release

      - name: Resolve release tag
        id: tag
        run: |
          VERSION=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "")
          DATE=$(date -u +%Y-%m-%d)
          if [ -n "$VERSION" ]; then
            echo "ref=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=db-${DATE}" >> "$GITHUB_OUTPUT"
          fi
          echo "title=Database ${DATE}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.ref }}" shodoukan.sqlite \
            --title "${{ steps.tag.outputs.title }}" \
            --notes "Database build from JMDict and KANJIDIC2." \
            --latest
