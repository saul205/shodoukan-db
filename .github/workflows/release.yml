name: Release database

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 03:00 UTC
  workflow_dispatch:       # also triggerable manually

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build database
        run: cargo run -p builder --release

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="db-$(date -u +%Y-%m-%d)"
          gh release create "$TAG" shodoukan.sqlite \
            --title "Database $TAG" \
            --notes "Monthly database build from JMDict and KANJIDIC2." \
            --latest
